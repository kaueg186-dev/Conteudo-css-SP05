<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 CSS</title>

</head>
<style>
    p {
        color: rgb(11, 147, 25);
        font-size: 30px;
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }

    #paragrafo-id {
        color: rgb(174, 5, 5);
        font-size: 24px;
        font-family: sans-serif;
    }

    center {
        font-size: 20px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        color: cornflowerblue;
        text-align: center;
    }
</style>

<body>
    <!-- Introdução Css -->

    <h2>Exemplo de conteúdo alterado pelo CSS</h2>

    <p>rio de janeiro</p>

    <p>São paulo</p>

    <p>verde</p>
    <hr>
    <h2>Exemplo de seletor com ID</h2>

    <p id="paragrafo-id">copa do mundo</p>
<hr>

<p class="center">Esse parágrafo pertence ao centro</p>
  


</body>

</html>
